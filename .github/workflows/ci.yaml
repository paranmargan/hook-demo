- name: Set up QEMU
  uses: docker/setup-qemu-action@v3

- name: Set up Docker Buildx
  uses: docker/setup-buildx-action@v3

- name: Login to Docker Hub
  uses: docker/login-action@v3
  with:
    username: ${{ secrets.DOCKERHUB_USERNAME }}
    password: ${{ secrets.DOCKERHUB_TOKEN }}

- name: Build and push Docker image
  uses: docker/build-push-action@v6
  with:
    context: .
    push: true
    platforms: linux/amd64,linux/arm64
    tags: |
      ${{ secrets.DOCKERHUB_USERNAME }}/hook-demo:${{ github.sha }}
      ${{ secrets.DOCKERHUB_USERNAME }}/hook-demo:latest

- name: Scan Docker image with Trivy
  uses: aquasecurity/trivy-action@0.33.1
  with:
    image-ref: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/hook-demo:${{ github.sha }}
    format: table
    vuln-type: os,library
    severity: HIGH,CRITICAL
    ignore-unfixed: true
    exit-code: 1

- name: Update development image tag
  run: |
    sed -i \
      "s/tag:.*/tag: \"${GITHUB_SHA}\"/" \
      environments/dev/values.yaml

- name: Commit Helm values change
  run: |
    git config user.name "github-actions[bot]"
    git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

    git add environments/dev/values.yaml

    if git diff --cached --quiet; then
      echo "No Helm values changes"
      exit 0
    fi

    git commit -m "Update dev image to ${GITHUB_SHA} [skip ci]"
    git push
