name: Build, Push and Update Helm

on:
  push:
    branches:
      - main
    paths-ignore:
      - "values.yaml"

permissions:
  contents: write

jobs:
  build-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
     
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64, linux/arm64
          tags: |
            paran1980/hook-demo:${{ github.sha }}
            paran1980/hook-demo:latest

      - name: Scan Docker image with Trivy
  	  uses: aquasecurity/trivy-action@0.33.1
  	  with:
            image-ref: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/hook-demo:${{ github.sha }}
            format: table
            vuln-type: os,library
            severity: HIGH,CRITICAL
            ignore-unfixed: true
            exit-code: 1

      - name: Update Helm image tag
        run: |
          sed -i 's/^[[:space:]]*tag:.*/  tag: "${{ github.sha }}"/' values.yaml

      - name: Commit updated values.yaml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add values.yaml

          if git diff --cached --quiet; then
            echo "No values.yaml change detected"
          else
            git commit -m "Update image tag to ${{ github.sha }} [skip ci]"
            git push origin main
          fi
